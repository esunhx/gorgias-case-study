name: BigQuery Job

on:
  push:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/399324940941/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'esunhx@gorgias-case-study-491217.iam.gserviceaccount.com'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - run: pip install google-cloud-bigquery

      - name: Test BigQuery access
        run: bq query --nouse_legacy_sql 'SELECT "connected" as status'